<!DOCTYPE html>
<!-- ══════════════════════════════════════════════════════════════════════════
  FACTURES SEN-CSU — PWA (Progressive Web App) pour les ICP
  Hebergee sur GitHub Pages. Fonctionne 100% hors ligne apres installation.
  Appelle la Web App Apps Script existante pour lire/ecrire dans le Sheet.
═══════════════════════════════════════════════════════════════════════════ -->
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1a7a4a">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Factures SEN-CSU</title>
<style>
  :root {
    --green:#1a7a4a; --green-dark:#14603a; --green-light:#e8f5ee;
    --grey:#f0f2f5; --text:#1a1a1a; --text2:#667; --danger:#c0392b; --orange:#e67e22;
  }
  * { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI',Roboto,Arial,sans-serif; }
  body { background:var(--grey); color:var(--text); min-height:100vh; }
  .topbar { background:var(--green); color:#fff; padding:12px 16px; display:flex;
    align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
  .topbar h1 { font-size:16px; font-weight:600; }
  .topbar .sub { font-size:11px; opacity:.85; }
  .badge-sync { background:var(--orange); color:#fff; border-radius:12px; font-size:11px;
    padding:3px 10px; font-weight:700; }
  .badge-ok { background:rgba(255,255,255,.25); }
  .screen { display:none; padding:16px; max-width:640px; margin:0 auto; }
  .screen.active { display:block; }
  .login-card { background:#fff; border-radius:12px; padding:28px 22px; margin-top:8vh;
    box-shadow:0 2px 12px rgba(0,0,0,.08); }
  .login-card .logo { text-align:center; margin-bottom:8px; }
  .login-card h2 { text-align:center; font-size:17px; margin:8px 0 4px; color:var(--green); }
  .login-card p { text-align:center; font-size:12px; color:var(--text2); margin-bottom:20px; }
  label { display:block; font-size:12px; font-weight:600; margin:12px 0 4px; color:#333; }
  input,select { width:100%; padding:12px; border:1px solid #ccc; border-radius:8px;
    font-size:15px; background:#fff; }
  input:focus,select:focus { outline:2px solid var(--green); border-color:var(--green); }
  .btn { width:100%; padding:14px; border:0; border-radius:8px; background:var(--green);
    color:#fff; font-size:15px; font-weight:700; cursor:pointer; margin-top:18px; }
  .btn:active { background:var(--green-dark); }
  .btn.secondary { background:#fff; color:var(--green); border:1.5px solid var(--green); }
  .btn.small { width:auto; padding:8px 16px; font-size:13px; margin-top:0; }
  .err { color:var(--danger); font-size:13px; margin-top:10px; text-align:center; min-height:18px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px; }
  .card { background:#fff; border-radius:12px; padding:16px 12px; text-align:center;
    box-shadow:0 1px 4px rgba(0,0,0,.06); cursor:pointer; border-top:4px solid var(--green); }
  .card:active { transform:scale(.97); }
  .card .ic { font-size:30px; }
  .card .t { font-size:12px; font-weight:700; margin-top:6px; line-height:1.3; }
  .syncbar { background:#fff; border-radius:10px; padding:12px 14px; margin-top:4px;
    display:flex; align-items:center; justify-content:space-between; box-shadow:0 1px 4px rgba(0,0,0,.06); font-size:13px; }
  .syncbar.pending { border-left:4px solid var(--orange); }
  .syncbar.done { border-left:4px solid var(--green); }
  .form-head { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .back { background:none; border:0; font-size:22px; cursor:pointer; color:var(--green); }
  .form-title { font-size:15px; font-weight:700; }
  .req::after { content:" *"; color:var(--danger); }
  .form-box { background:#fff; border-radius:12px; padding:18px 16px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#222;
    color:#fff; padding:12px 22px; border-radius:24px; font-size:13px; display:none; z-index:99; max-width:90%; }
  .offline-banner { background:var(--orange); color:#fff; text-align:center; font-size:12px; padding:6px; display:none; }
  .install-banner { background:var(--green-light); border:1px solid var(--green); border-radius:10px;
    padding:12px; margin-top:12px; font-size:13px; display:none; }
  .install-banner button { margin-top:8px; }
</style>
</head>

  </div>

  <div class="form-head">
    <button class="back" onclick="showScreen('screenHome')">←</button>
    <div class="form-title" id="formTitle"></div>
  </div>
  <div class="form-box">
    <div id="formFields"></div>
    <button class="btn" onclick="saveEntry(true)">💾 Enregistrer</button>
    <button class="btn secondary" onclick="saveEntry(false)">➕ Enregistrer & Nouveau (même patient)</button>
    <div class="err" id="formErr"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════ CONFIGURATION ══════════════
// ⚠️ REMPLACER par l'URL de VOTRE Web App Apps Script (celle qui finit par /exec)
var API_URL = "___URL_WEBAPP_EXEC___";

var APP = { auth:null, user:null, postes:[], regimes:{}, referentiels:{services:[],prestations:[],prix:{}}, currentRegime:null };
var LS_AUTH="sencsu_auth", LS_QUEUE="sencsu_queue", LS_BOOT="sencsu_boot";
var deferredPrompt = null;

function $(id){ return document.getElementById(id); }
function showScreen(id){ document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");}); $(id).classList.add("active"); window.scrollTo(0,0); }
function toast(m,ms){ var t=$("toast"); t.textContent=m; t.style.display="block"; clearTimeout(t._h); t._h=setTimeout(function(){t.style.display="none";}, ms||2600); }
function getQueue(){ try{ return JSON.parse(localStorage.getItem(LS_QUEUE)||"[]"); }catch(e){ return []; } }
function setQueue(q){ localStorage.setItem(LS_QUEUE, JSON.stringify(q)); }
function uid(){ return Date.now()+"_"+Math.random().toString(36).slice(2,8); }

// ══════════════ APPEL API (vers Apps Script) ══════════════
// Utilise fetch avec la methode POST. En cas d'echec (hors ligne), rejette la promesse.
function apiCall(params) {
  var url = API_URL + "?";
  var parts = [];
  Object.keys(params).forEach(function(k){
    parts.push(encodeURIComponent(k) + "=" + encodeURIComponent(params[k]));
  });
  url += parts.join("&");
  return fetch(url, { method: "GET", redirect: "follow" })
    .then(function(r){ return r.json(); });
}

function updateSyncUI(){
  var q=getQueue(), badge=$("syncBadge"), bar=$("syncbar"), msg=$("syncMsg");
  if(q.length>0){ badge.textContent="⏳ "+q.length; badge.className="badge-sync"; bar.className="syncbar pending"; msg.textContent="⏳ "+q.length+" dossier(s) en attente"; }
  else { badge.textContent="✓"; badge.className="badge-sync badge-ok"; bar.className="syncbar done"; msg.textContent="✅ Tout est synchronisé"; }
}

// ══════════════ CONNEXION ══════════════
function doLogin(){
  var email=$("loginEmail").value.trim(), pin=$("loginPin").value.trim();
  if(!email){ $("loginErr").textContent="Entrez votre email."; return; }
  $("btnLogin").disabled=true; $("loginErr").textContent="Connexion...";

  apiCall({ action:"bootstrap", email:email, pin:pin })
    .then(function(res){
      $("btnLogin").disabled=false;
      if(res.error){ $("loginErr").textContent=res.error; return; }
      APP.auth={email:email, pin:pin};
      localStorage.setItem(LS_AUTH, JSON.stringify(APP.auth));
      localStorage.setItem(LS_BOOT, JSON.stringify(res));
      applyBootstrap(res);
    })
    .catch(function(err){
      $("btnLogin").disabled=false;
      // Hors ligne : tenter la reconnexion avec le cache
      var boot=null; try{ boot=JSON.parse(localStorage.getItem(LS_BOOT)||"null"); }catch(e){}
      var savedAuth=null; try{ savedAuth=JSON.parse(localStorage.getItem(LS_AUTH)||"null"); }catch(e){}
      if(boot && savedAuth && savedAuth.email.toLowerCase()===email.toLowerCase() && savedAuth.pin===pin){
        APP.auth=savedAuth; applyBootstrap(boot);
        toast("📴 Connecté hors ligne (données en cache)");
      } else {
        $("loginErr").textContent="📴 Pas de connexion. Première connexion impossible hors ligne.";
      }
    });
}

function applyBootstrap(res){
  APP.user=res.user; APP.postes=res.postes||[]; APP.regimes=res.regimes;
  APP.referentiels=res.referentiels||{services:[],prestations:[],prix:{}};
  $("topbar").style.display="flex";
  $("userInfo").textContent=APP.user.email+" — "+APP.user.role+(APP.user.poste?" ("+APP.user.poste+")":"");
  buildHomeGrid(); updateSyncUI(); showScreen("screenHome"); trySync(false);
}

function doLogout(){
  var q=getQueue();
  if(q.length>0 && !confirm(q.length+" dossier(s) non synchronisé(s). Se déconnecter quand même ?")) return;
  localStorage.removeItem(LS_AUTH); APP.auth=null; APP.user=null;
  $("topbar").style.display="none"; showScreen("screenLogin");
}

// ══════════════ ACCUEIL ══════════════
function buildHomeGrid(){
  var grid=$("regimeGrid"); grid.innerHTML="";
  Object.keys(APP.regimes).forEach(function(key){
    var r=APP.regimes[key], card=document.createElement("div");
    card.className="card"; card.style.borderTopColor=r.couleur||"#1a7a4a";
    card.innerHTML='<div class="ic">'+(r.icone||"📋")+'</div><div class="t">'+r.titre+'</div>';
    card.onclick=function(){ openForm(key); };
    grid.appendChild(card);
  });
}

// ══════════════ FORMULAIRE (identique a l'app Apps Script) ══════════════
function calculerAge(dateStr){
  var n=new Date(dateStr); if(isNaN(n)) return null;
  var a=new Date(), age=a.getFullYear()-n.getFullYear(), m=a.getMonth()-n.getMonth();
  if(m<0||(m===0&&a.getDate()<n.getDate())) age--;
  return age;
}

function openForm(regimeKey, keepAdmin){
  APP.currentRegime=regimeKey; var regime=APP.regimes[regimeKey];
  $("formTitle").textContent=(regime.icone||"")+" "+regime.titre; $("formErr").textContent="";
  var box=$("formFields"), oldValues={};
  if(keepAdmin){ box.querySelectorAll("[data-field]").forEach(function(el){ oldValues[el.getAttribute("data-field")]=el.value; }); }
  box.innerHTML="";
  if(APP.user.role!=="ICP" && APP.postes.length>0){
    var lbl=document.createElement("label"); lbl.textContent="Poste de santé"; lbl.className="req";
    var sel=document.createElement("select"); sel.id="fieldPoste";
    APP.postes.forEach(function(p){ var o=document.createElement("option"); o.value=p; o.textContent=p; sel.appendChild(o); });
    box.appendChild(lbl); box.appendChild(sel);
  }
  var today=new Date().toISOString().slice(0,10);
  regime.fields.forEach(function(f){
    var lbl=document.createElement("label"); lbl.textContent=f.name; if(f.req) lbl.className="req"; box.appendChild(lbl);
    var el;
    var useSelectRef=(f.list==="services" && APP.referentiels.services && APP.referentiels.services.length>0);
    if(f.type==="select"||useSelectRef){
      el=document.createElement("select");
      var empty=document.createElement("option"); empty.value=""; empty.textContent="— choisir —"; el.appendChild(empty);
      var opts=useSelectRef?APP.referentiels.services:(f.options||[]);
      opts.forEach(function(o){ var opt=document.createElement("option"); opt.value=o; opt.textContent=o; el.appendChild(opt); });
    } else {
      el=document.createElement("input");
      el.type=(f.type==="datetime")?"datetime-local":(f.type==="number")?"number":(f.type==="date")?"date":(f.type==="tel")?"tel":"text";
      if(f.type==="date"&&f.today) el.value=today;
      if(f.type==="number"){ el.min="0"; el.inputMode="numeric"; }
      if(f.list && APP.referentiels[f.list] && APP.referentiels[f.list].length){
        var dlId="dl_"+f.list;
        if(!document.getElementById(dlId)){
          var dl=document.createElement("datalist"); dl.id=dlId;
          APP.referentiels[f.list].forEach(function(v){ var o=document.createElement("option"); o.value=v; dl.appendChild(o); });
          document.body.appendChild(dl);
        }
        el.setAttribute("list",dlId);
        if(f.list==="prestations"){
          el.addEventListener("change",function(){
            var prix=APP.referentiels.prix[el.value];
            if(prix!==undefined){ var pu=box.querySelector("[data-pu]"); if(pu){ pu.value=prix; computeMontant(); } }
          });
        }
      }
    }
    el.setAttribute("data-field",f.name);
    if(f.qte){ el.setAttribute("data-qte","1"); el.addEventListener("input",computeMontant); }
    if(f.pu){ el.setAttribute("data-pu","1"); el.addEventListener("input",computeMontant); }
    if(f.montant){ el.setAttribute("data-montant","1"); }
    if(keepAdmin && oldValues[f.name]!==undefined && !f.qte && !f.pu && !f.montant &&
       !/prestation|service|diagnostic|forfait|date de prise|nbre|séance|poche/i.test(f.name)){
      el.value=oldValues[f.name];
    }
    box.appendChild(el);
  });
  showScreen("screenForm");
}

function computeMontant(){
  var box=$("formFields"), qte=box.querySelector("[data-qte]"), pu=box.querySelector("[data-pu]"), mt=box.querySelector("[data-montant]");
  if(qte&&pu&&mt){ var q=parseFloat(qte.value), p=parseFloat(pu.value); if(!isNaN(q)&&!isNaN(p)) mt.value=q*p; }
}

function saveEntry(closeAfter){
  var regime=APP.regimes[APP.currentRegime], box=$("formFields"), data={}, missing=[], dateNaissance=null;
  regime.fields.forEach(function(f){
    var el=box.querySelector('[data-field="'+f.name.replace(/"/g,'\\"')+'"]');
    var val=el?el.value.trim():"";
    if(f.name==="Date de naissance" && val) dateNaissance=val;
    if((f.type==="date"||f.type==="datetime") && val){
      var d=new Date(val);
      if(!isNaN(d)){ var dd=("0"+d.getDate()).slice(-2), mm=("0"+(d.getMonth()+1)).slice(-2);
        val=dd+"/"+mm+"/"+d.getFullYear();
        if(f.type==="datetime") val+=" "+("0"+d.getHours()).slice(-2)+"h"+("0"+d.getMinutes()).slice(-2);
      }
    }
    data[f.name]=val; if(f.req && !val) missing.push(f.name);
  });
  if(missing.length){ $("formErr").textContent="Champs obligatoires manquants : "+missing.join(", "); return; }
  if(dateNaissance){
    var age=calculerAge(dateNaissance);
    if(APP.currentRegime==="ENFANTS_5ANS" && age>=5){ $("formErr").textContent="⛔ Cet enfant a "+age+" ans (régime réservé aux moins de 5 ans)."; return; }
    if(APP.currentRegime==="SESAME" && age<60){ $("formErr").textContent="⛔ Ce patient a "+age+" ans (Plan Sésame réservé aux 60 ans et plus)."; return; }
  }
  var posteSel=$("fieldPoste"), poste=posteSel?posteSel.value:APP.user.poste;
  var q=getQueue(); q.push({id:uid(), regime:APP.currentRegime, poste:poste, data:data}); setQueue(q);
  updateSyncUI(); $("formErr").textContent=""; toast("💾 Dossier enregistré ("+q.length+" en attente)");
  trySync(false);
  if(closeAfter) showScreen("screenHome"); else openForm(APP.currentRegime, true);
}

// ══════════════ SYNCHRONISATION ══════════════
var syncing=false;
function trySync(manual){
  if(syncing) return;
  var q=getQueue();
  if(q.length===0){ if(manual) toast("✅ Rien à synchroniser"); return; }
  if(!navigator.onLine){ if(manual) toast("📴 Pas de réseau — réessayez plus tard"); return; }
  if(!APP.auth) return;
  syncing=true; if(manual) toast("🔄 Synchronisation...");
  apiCall({ action:"submit", email:APP.auth.email, pin:APP.auth.pin, entries:JSON.stringify(q) })
    .then(function(res){
      syncing=false;
      if(res.error){ if(manual) toast("❌ "+res.error); return; }
      var savedIds=res.saved||[];
      var remaining=getQueue().filter(function(e){ return savedIds.indexOf(e.id)<0; });
      setQueue(remaining); updateSyncUI();
      if(savedIds.length>0) toast("✅ "+savedIds.length+" dossier(s) synchronisé(s)");
    })
    .catch(function(){ syncing=false; if(manual) toast("❌ Erreur réseau — données conservées sur le téléphone",3500); });
}

window.addEventListener("online", function(){ $("offlineBanner").style.display="none"; trySync(false); });
window.addEventListener("offline", function(){ $("offlineBanner").style.display="block"; });

// ══════════════ INSTALLATION PWA ══════════════
window.addEventListener("beforeinstallprompt", function(e){
  e.preventDefault(); deferredPrompt=e;
  $("installBanner").style.display="block";
});
function installerApp(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(){ deferredPrompt=null; $("installBanner").style.display="none"; });
}

// ══════════════ DEMARRAGE ══════════════
(function init(){
  if(!navigator.onLine) $("offlineBanner").style.display="block";
  // Enregistrer le service worker (le coeur de l'offline)
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("./sw.js").catch(function(e){ console.log("SW erreur:", e); });
  }
  // Reconnexion auto avec le cache
  try {
    var saved=JSON.parse(localStorage.getItem(LS_AUTH)||"null");
    var boot=JSON.parse(localStorage.getItem(LS_BOOT)||"null");
    if(saved && boot && !boot.error){
      APP.auth=saved; applyBootstrap(boot);
      if(navigator.onLine){
        apiCall({ action:"bootstrap", email:saved.email, pin:saved.pin })
          .then(function(res){ if(!res.error){ localStorage.setItem(LS_BOOT, JSON.stringify(res)); APP.postes=res.postes; APP.regimes=res.regimes; APP.referentiels=res.referentiels; } })
          .catch(function(){});
      }
    }
  } catch(e){}
})();
</script>
